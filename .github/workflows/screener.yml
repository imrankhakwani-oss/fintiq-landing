name: Factor Screener — Weekly Update

on:
  schedule:
    # Every Sunday at 06:00 UTC (early morning, markets closed)
    - cron: '0 6 * * 0'
  workflow_dispatch:
    # Manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  run-screener:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: screener/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r screener/requirements.txt

      - name: Run factor screener (all 3 lookbacks)
        run: |
          python screener/run_screener.py

      - name: Commit updated JSON files
        run: |
          git config user.name  "Fintiq Screener Bot"
          git config user.email "bot@fintiq.uk"
          git add Articles/screener-data*.json Articles/screener-meta*.json
          git diff --cached --quiet || git commit -m "chore: weekly screener update $(date -u '+%Y-%m-%d')"
          git push
